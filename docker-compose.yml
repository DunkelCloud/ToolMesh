services:
  toolmesh:
    image: ghcr.io/dunkelcloud/toolmesh:latest
    # To build locally instead of pulling the image, comment the line above
    # and uncomment the next line:
    # build: .
    ports:
      - "${TOOLMESH_PORT:-8123}:8080"
    env_file: .env
    environment:
      - OPENFGA_MODE=${OPENFGA_MODE:-bypass}
      - TEMPORAL_MODE=${TEMPORAL_MODE:-bypass}
      - TOOLMESH_DATA_DIR=/app/data
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - ./internal/gate/policies:/app/policies:ro
      - ./tools:/app/tools:ro
      - ./dadl:/app/dadl:ro
      - ./data:/app/data

  # Demo MCP backend (optional — uncomment to enable)
  # Note: mcp/everything has a known crash loop with SSE transport.
  # Use only for testing, not in production.
  # everything:
  #   image: mcp/everything
  #   entrypoint: ["node", "dist/sse.js"]
  #   ports:
  #     - "3001:3001"

  temporal:
    image: temporalio/auto-setup:latest
    profiles: ["durable"]
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD:-temporal}
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "temporal:7233"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:latest
    profiles: ["durable"]
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233

  openfga-migrate:
    image: openfga/openfga:latest
    command: migrate
    environment:
      - OPENFGA_DATASTORE_ENGINE=mysql
      - OPENFGA_DATASTORE_URI=${OPENFGA_DB_USER:-openfga}:${OPENFGA_DB_PASSWORD:-openfga}@tcp(mysql:3306)/${OPENFGA_DB_NAME:-openfga}?parseTime=true
    depends_on:
      mysql:
        condition: service_healthy

  openfga:
    image: openfga/openfga:latest
    ports:
      - "8081:8080"
      - "8082:8081"
    command: run
    environment:
      - OPENFGA_DATASTORE_ENGINE=mysql
      - OPENFGA_DATASTORE_URI=${OPENFGA_DB_USER:-openfga}:${OPENFGA_DB_PASSWORD:-openfga}@tcp(mysql:3306)/${OPENFGA_DB_NAME:-openfga}?parseTime=true
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=:8081"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16
    profiles: ["durable"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TEMPORAL_DB_USER: ${TEMPORAL_DB_USER:-temporal}
      TEMPORAL_DB_PASSWORD: ${TEMPORAL_DB_PASSWORD:-temporal}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${OPENFGA_DB_NAME:-openfga}
      MYSQL_USER: ${OPENFGA_DB_USER:-openfga}
      MYSQL_PASSWORD: ${OPENFGA_DB_PASSWORD:-openfga}
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: eqalpha/keydb:alpine
    ports:
      - "6379:6379"
    command: keydb-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Reverse proxy (uncomment for HTTPS / Claude.ai access) ---
  # caddy:
  #   image: caddy:2-alpine
  #   ports:
  #     - "443:443"
  #     - "80:80"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - toolmesh

volumes:
  pgdata:
  mysqldata:
  redisdata:

