run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    # defaults
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    # style & quality
    - gocritic
    - revive
    - misspell
    - gofmt
    - goimports
    - goconst
    - unconvert
    - unparam
    - dupword
    - prealloc
    # correctness
    - errorlint
    - exhaustive
    # security & reliability
    - gosec
    - bodyclose
    - noctx
  disable:
    - depguard

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
          - "disableStutteringCheck"
  gocritic:
    enabled-tags:
      - diagnostic
      - style
    disabled-checks:
      - ifElseChain
      - hugeParam
  misspell:
    locale: US
  exhaustive:
    default-signifies-exhaustive: true
  gosec:
    excludes:
      - G104  # unhandled errors — already covered by errcheck
  goconst:
    min-len: 3
    min-occurrences: 3

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
