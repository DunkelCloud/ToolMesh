name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    # Skip build when a PR is closed without merging (cleanup job handles deletion)
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # PR: pr-<number>
            type=ref,event=pr,prefix=pr-
            # Push to main: dev
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag v1.2.3: 1.2.3, 1.2, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Delete PR image when PR is merged or closed
  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete PR image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          TAG="pr-${PR_NUMBER}"
          VERSION_ID=$(gh api "orgs/DunkelCloud/packages/container/toolmesh/versions?per_page=100" \
            | jq -r --arg tag "${TAG}" '.[] | select(.metadata.container.tags[] == $tag) | .id')
          if [ -n "${VERSION_ID}" ]; then
            gh api --method DELETE "orgs/DunkelCloud/packages/container/toolmesh/versions/${VERSION_ID}"
            echo "Deleted version ${VERSION_ID} (tag: ${TAG})"
          else
            echo "No version found for tag ${TAG}"
          fi
        continue-on-error: true
