version: "2"
run:
  go: "1.25"
linters:
  enable:
    - bodyclose
    - dupword
    - errorlint
    - exhaustive
    - goconst
    - gocritic
    - gosec
    - misspell
    - noctx
    - prealloc
    - revive
    - unconvert
    - unparam
  disable:
    - depguard
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - ifElseChain
        - hugeParam
      enabled-tags:
        - diagnostic
        - style
    gosec:
      excludes:
        - G104
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - disableStutteringCheck
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
          - gocritic
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
