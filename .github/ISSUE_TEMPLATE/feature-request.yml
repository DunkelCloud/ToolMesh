name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: "Describe the use case or pain point."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "How would you like this to work?"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - DADL format / REST proxy
        - Authorization (OpenFGA)
        - Credential Store
        - Output Gate / Policies
        - Audit Logging
        - Code Mode
        - Authentication (OAuth / API keys)
        - Deployment / Docker
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Any workarounds or alternative approaches you have tried."
    validations:
      required: false
