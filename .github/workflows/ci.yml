name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -v ./...

      - name: Build
        run: |
          CGO_ENABLED=0 go build -o toolmesh ./cmd/toolmesh
          CGO_ENABLED=0 go build -o tm-bootstrap ./cmd/tm-bootstrap
