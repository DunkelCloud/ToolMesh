  keydb:
    image: eqalpha/keydb:alpine
    # No ports exposed — only accessible from within the Docker network.
    command: keydb-server --appendonly yes
    volumes:
      - keydbdata:/data
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

