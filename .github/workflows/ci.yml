name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v9
        with:
          # Pin to a known-good lint version. The action otherwise floats to
          # the latest release; v2.12.2 (2026-05-06) tightened goconst enough
          # to flag 400+ pre-existing findings across the codebase, blocking
          # every PR on unrelated style nits. Bump deliberately, alongside a
          # cleanup commit, when we want to adopt a newer version.
          version: v2.11.4

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

      - name: Build
        run: |
          CGO_ENABLED=0 go build -o toolmesh ./cmd/toolmesh
